commitment = "Hard"
windup_ms = 350
active_ms = 150
recovery_ms = 400
cancel_set = ["dodge", "special_skill"]
cancel_window_ms = 120
bufferable = true
buffer_window_ms = 200
physics_req = "Grounded"
movement_lock = "Full"
rotation_lock = "TargetDirection"
interrupt_on_move = false

[action.dodge]
name = "闪避"
category = "Combat"
kind = "Discrete"
priority = 25
commitment = "Hard"
windup_ms = 0
active_ms = 350
recovery_ms = 100
cancel_set = ["dodge", "jump"]
