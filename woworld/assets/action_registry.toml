# Action Registry — 初始动作定义
# 参见: WoWorld-Design/.../角色控制器/003-ActionController与离散动作.md §三

[action.light_attack]
name = "轻攻击"
category = "Combat"
kind = "Discrete"
priority = 15
commitment = "Hard"
windup_ms = 120
active_ms = 100
recovery_ms = 250
cancel_set = ["heavy_attack", "special_skill"]
cancel_window_ms = 120
bufferable = true
buffer_window_ms = 150
physics_req = "Grounded"
movement_lock = "Full"
rotation_lock = "TargetDirection"
interrupt_on_move = false

[action.heavy_attack]
name = "重攻击"
category = "Combat"
kind = "Discrete"
priority = 15
commitment = "Hard"
windup_ms = 350
active_ms = 150
recovery_ms = 400
cancel_set = ["dodge", "special_skill"]
cancel_window_ms = 120
bufferable = true
buffer_window_ms = 200
physics_req = "Grounded"
movement_lock = "Full"
rotation_lock = "TargetDirection"
interrupt_on_move = false

[action.dodge]
name = "闪避"
category = "Combat"
kind = "Discrete"
priority = 25
commitment = "Hard"
windup_ms = 0
active_ms = 350
recovery_ms = 100
cancel_set = ["dodge", "jump"]
cancel_window_ms = 100
bufferable = true
buffer_window_ms = 200
physics_req = "Grounded"
movement_lock = "Full"
rotation_lock = "InputDirection"
interrupt_on_move = false

[action.jump]
name = "跳跃"
category = "Movement"
kind = "Discrete"
priority = 20
commitment = "Hard"
windup_ms = 50
active_ms = 300
recovery_ms = 100
cancel_set = ["dodge"]
cancel_window_ms = 0
bufferable = true
buffer_window_ms = 200
physics_req = "Grounded"
movement_lock = "Full"
rotation_lock = "InputDirection"
interrupt_on_move = false

[action.interact]
name = "交互"
category = "Interaction"
kind = "Discrete"
priority = 10
commitment = "Soft"
windup_ms = 0
active_ms = 100
recovery_ms = 0
cancel_set = []
cancel_window_ms = 0
bufferable = false
buffer_window_ms = 0
physics_req = "Grounded"
movement_lock = "Full"
rotation_lock = "TargetDirection"
interrupt_on_move = true

[action.block]
name = "防御"
category = "Combat"
kind = "Continuous"
priority = 20
commitment = "Soft"
windup_ms = 50
active_ms = 0
recovery_ms = 100
cancel_set = ["dodge", "parry", "light_attack", "heavy_attack"]
cancel_window_ms = 999
bufferable = false
buffer_window_ms = 0
physics_req = "Grounded"
movement_lock = "Partial"                     # ★ 006 §三：防御时可慢走（movement_lock_speed=1.0，speed_cap 暂硬编码）
rotation_lock = "CameraForward"
interrupt_on_move = false
# ★ Sprint-065: 006 持续动作运行时——Stamina 消耗 + Complete 释放
release_behavior = "Complete"
sustain_drain = { resource = "Stamina", rate_per_sec = 3.0, overextend_multiplier = 2.0 }
overextend_threshold_secs = 8.0
critical_threshold_secs = 12.0

# ── Sprint-065: aim_bow 充能动作（006 §四）——三阶梯 + Penalize overcharge ──
# ⚠️ 序列化格式说明：ReleaseBehavior/OverchargeBehavior 走 serde 默认外部标签
#    （变体名作 key），非 006 文档示例的内部标签 { kind = "Charged" }——
#    数据表示按实现，设计语义不变（CLAUDE.md：伪代码阐明理念，实现可重构）。
[action.aim_bow]
name = "瞄准拉弓"
category = "Combat"
kind = "Charge"
priority = 12
commitment = "Hard"
windup_ms = 200
active_ms = 0
recovery_ms = 0
cancel_set = ["dodge"]
cancel_window_ms = 999
bufferable = false
buffer_window_ms = 0
physics_req = "NotInWater"
movement_lock = "Partial"
rotation_lock = "CameraForward"
interrupt_on_move = false
sustain_drain = { resource = "Stamina", rate_per_sec = 5.0, overextend_multiplier = 1.5 }
overextend_threshold_secs = 2.0
critical_threshold_secs = 4.0

[action.aim_bow.release_behavior.Charged]
stages = [
    { threshold_ms = 0, action_id = "quick_shot", power_multiplier = 0.5 },
    { threshold_ms = 400, action_id = "aimed_shot", power_multiplier = 1.0 },
    { threshold_ms = 800, action_id = "full_draw", power_multiplier = 1.3 },
]
on_overcharge = { Penalize = { accuracy_loss_per_sec = 0.15 } }

# ── aim_bow 充能子动作（离散，释放瞬间触发）──
