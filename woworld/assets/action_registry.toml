# Action Registry — 初始动作定义
# 参见: WoWorld-Design/.../角色控制器/003-ActionController与离散动作.md §三

[action.light_attack]
name = "轻攻击"
category = "Combat"
kind = "Discrete"
priority = 15
commitment = "Hard"
windup_ms = 120
active_ms = 100
recovery_ms = 250
cancel_set = ["heavy_attack", "special_skill"]
cancel_window_ms = 120
bufferable = true
buffer_window_ms = 150
physics_req = "Grounded"
movement_lock = "Full"
rotation_lock = "TargetDirection"
interrupt_on_move = false

[action.heavy_attack]
name = "重攻击"
category = "Combat"
