# 大气曲线 — 太阳高度角驱动的 TOML 锚点数组
#
# sun_elevation: 太阳高度角（度）
#   -90°  = 午夜天底（太阳在脚下）
#     0°  = 地平线（日出/日落——锚点此处确保与天文学同步）
#   +90°  = 正午天顶
#
# 归一化映射: (elev + 90) / 180 → [0, 1]
# 增删锚点只需修改此文件，零 Rust 代码变动。

[[anchors]]
sun_elevation = -90.0
sky_zenith = [0.04, 0.04, 0.12]
sky_horizon = [0.02, 0.02, 0.05]
ambient = [0.03, 0.03, 0.06]
sun_color = [0.04, 0.04, 0.08]
sun_energy = 0.02

